global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['jenkins-controller:8080']
    # Jenkins must have the Prometheus plugin installed.

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'jenkins-controller:9100'
          - 'jenkins-agent:9100'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: swapi-db
    environment:
      - POSTGRES_USER=swapi
      - POSTGRES_PASSWORD=swapi_pass
      - POSTGRES_DB=swapi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swapi -d swapi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swapi-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: swapi-backend
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://swapi:swapi_pass@db:5432/swapi_db
      - FLASK_ENV=development
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - swapi-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: swapi-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - swapi-network

networks:
  swapi-network:
    driver: bridge

volumes:
  postgres_data:
